<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>自行車社團</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;

            /* 背景圖 */
            background-image: url("backg.jpg");
            background-size: cover;
            background-repeat: no-repeat;
            background-position: center;
            background-attachment: fixed;
        }

        header {
            background: #1e88e5;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        .section {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        h2 {
            border-left: 5px solid #1e88e5;
            padding-left: 10px;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }

        .photo-grid img {
            width: 100%;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<header>
    🚴‍♂️ 自行車社團 Nextron
</header>

<div class="container">

    <div class="section">
        <h2>此為自行車(人力、獸力行駛車輛社團)</h2>
        <h2>網站測試中</h2>
    </div>

    <div class="section">
        <h1>📅 活動發布</h1>
        <h2>預計淡水 6/13 </h2>
        <h2>報名link->Google表單</h2>
    </div>

    <!-- 📌 報名表單 -->
    <div class="section">
        <h2>📅 活動報名</h2>

        <iframe 
            src="https://docs.google.com/forms/d/e/1FAIpQLSclQk2clsFossrjK8Qtw2B_hPNfuY7IZqnEdf_dXPY4c6SJdg/viewform?usp=dialog"
            width="100%" 
            height="600">
        </iframe>
    </div>

    <!-- 📌 報名名單 -->
    <div class="section">
        <h2>👥 已報名名單(更新需1~2分)</h2>
        <div id="list">載入中...</div>
    </div>

    <div class="section">
        <h2>📸 活動照片</h2>
        <div class="photo-grid">
            <img src="https://picsum.photos/300/200?1">
            <img src="https://picsum.photos/300/200?2">
            <img src="https://picsum.photos/300/200?3">
            <img src="https://picsum.photos/300/200?4">
        </div>
    </div>

    <!-- ⭐⭐⭐ 你的留言板：完全保留不動 ⭐⭐⭐ -->
    <div class="section">
        <h2>💬 留言討論區</h2>

        <div class="commentbox"></div>
        <script src="https://unpkg.com/commentbox.io/dist/commentBox.min.js"></script>
        <script>
            commentBox('5671439357181952-proj')
        </script>
    </div>

</div>

<!-- 📌 抓 Google Sheet CSV -->
<script>
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vRV3KnBxzMys3GoX1VukwyWQvQebGctp1r0_QqwIyZwMhTJqjcvvWrDwvV4FMdGnW0Qw5dNOR8knbqq/pub?output=csv")
.then(res => res.text())
.then(data => {

    let rows = data.trim().split("\n").slice(1);

// ✅ 只取最後 15 筆
    rows = rows.slice(-15);
    let html = "<ul>";

    rows.forEach(row => {
        let cols = row.split(",");

        let time = cols[1] || "";
        let name = cols[2] || "";
        let ppl = cols[3] || "";
        if(name){
            html += `<li>${time} ｜ ${name}</li> ｜ ${ppl}</li>`;
        }
    });

    html += "</ul>";

    document.getElementById("list").innerHTML = html;
});
</script>

</body>
</html>
