<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>自行車社團</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f8;
        }

        header {
            background: #1e88e5;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
        }

        .container {
            width: 90%;
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        .section {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        h2 {
            border-left: 5px solid #1e88e5;
            padding-left: 10px;
        }

        .photo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 10px;
        }

        .photo-grid img {
            width: 100%;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<header>
    ???♂? 自行車社團 Nextron
</header>

<div class="container">

    <!-- 活動 -->
    <div class="section">
        <h2>?? 活動發布</h2>
        <h3>預計淡水 6/13</h3>
        <h3>報名請使用下方表單</h3>
    </div>

    <!-- ?? 報名表單 -->
    <div class="section">
        <h2>?? 活動報名</h2>

        <iframe 
            src="https://docs.google.com/forms/d/e/1FAIpQLSclQk2clsFossrjK8Qtw2B_hPNfuY7IZqnEdf_dXPY4c6SJdg/viewform?usp=dialog"
            width="100%" 
            height="600">
        </iframe>
    </div>

    <!-- ?? 報名名單 -->
    <div class="section">
        <h2>?? 已報名名單</h2>
        <div id="list">載入中...</div>
    </div>

    <!-- 照片 -->
    <div class="section">
        <h2>?? 活動照片</h2>
        <div class="photo-grid">
            <img src="https://picsum.photos/300/200?1">
            <img src="https://picsum.photos/300/200?2">
            <img src="https://picsum.photos/300/200?3">
            <img src="https://picsum.photos/300/200?4">
        </div>
    </div>

</div>

<!-- ?? 抓 Google Sheet CSV -->
<script>
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vRV3KnBxzMys3GoX1VukwyWQvQebGctp1r0_QqwIyZwMhTJqjcvvWrDwvV4FMdGnW0Qw5dNOR8knbqq/pub?output=csv")
.then(res => res.text())
.then(data => {

    let rows = data.trim().split("\n").slice(1);
    let html = "<ul>";

    rows.forEach(row => {
        let cols = row.split(",");

        let name = cols[1] || "";
        let phone = cols[2] || "";

        if(name){
            html += `<li>${name} ｜ ${phone}</li>`;
        }
    });

    html += "</ul>";

    document.getElementById("list").innerHTML = html;
});
</script>

</body>
</html>
